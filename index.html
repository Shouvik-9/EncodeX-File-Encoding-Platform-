<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="QrLogo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EncodeX</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">
        <h1 class="title">Welcome to EncodeX</h1>
        <p class="subtitle">Your daily QR code generating tool</p>

        <p>Enter your text or URL</p>
        <input type="text" placeholder="Text or URL" id="qrText">

        <div id="imgBox">
            <div class="qr-wrapper">
                <img src="" id="qrImage">

                <!-- Action Icons -->
                <div class="qr-actions">

                    <!-- Download -->
                    <span onclick="downloadQR()" title="Download QR">
                        <i class="fa-solid fa-download"></i>
                    </span>

                    <!-- Copy Link -->
                    <span onclick="copyQRLink()" title="Copy QR Link">
                        <i class="fa-solid fa-link"></i>
                    </span>

                    <!-- Share -->
                    <span onclick="shareQR()" title="Share QR">
                        <i class="fa-solid fa-share-nodes"></i>
                    </span>

                </div>
            </div>
        </div>

        <button onclick="generateQR()">Generate QR Code</button>
    </div>

    <script>
        let imgBox = document.getElementById("imgBox");
        let qrImage = document.getElementById("qrImage");
        let qrText = document.getElementById("qrText");
        let qrActions = document.querySelector(".qr-actions");

        let currentQRUrl = "";

        function generateQR() {
            if (qrText.value.length > 0) {

                // 🔥 Encode input safely
                let qrURL = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="
                    + encodeURIComponent(qrText.value);

                currentQRUrl = qrURL;

                qrImage.crossOrigin = "anonymous";

                // 🔥 Hide icons before loading
                qrActions.style.display = "none";

                qrImage.onload = function () {
                    imgBox.classList.add("show-img");
                    qrActions.style.display = "flex"; // show after load
                };

                qrImage.src = qrURL;

            } else {
                qrText.classList.add('error');
                setTimeout(() => {
                    qrText.classList.remove('error');
                }, 1000);
            }
        }

        function downloadQR() {
            if (!qrImage.src) {
                alert("Generate QR first!");
                return;
            }

            try {
                let canvas = document.createElement("canvas");
                let context = canvas.getContext("2d");

                canvas.width = qrImage.naturalWidth;
                canvas.height = qrImage.naturalHeight;

                context.drawImage(qrImage, 0, 0);

                let link = document.createElement("a");
                link.download = "QRCode.png";
                link.href = canvas.toDataURL("image/png");
                link.click();

            } catch (error) {
                alert("Download failed!");
            }
        }

        function copyQRLink() {
            if (currentQRUrl) {
                navigator.clipboard.writeText(currentQRUrl);
                alert("QR link copied!");
            } else {
                alert("Generate QR first!");
            }
        }

        function shareQR() {
            if (!currentQRUrl) {
                alert("Generate QR first!");
                return;
            }

            if (navigator.share) {
                navigator.share({
                    title: "My QR Code",
                    text: "Check this QR Code",
                    url: currentQRUrl
                });
            } else {
                alert("Sharing not supported on this device");
            }
        }

        // Enter key support
        qrText.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                generateQR();
            }
        });
    </script>

</body>

</html>
